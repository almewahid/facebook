services:
  - type: web
    name: facebook-auto-poster-api
    runtime: docker
    plan: starter
    rootDir: backend
    healthCheckPath: /health
    autoDeploy: true
    disk:
      name: data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: DATABASE_URL
        value: sqlite:////var/data/facebook_bot.db
      - key: ALLOWED_ORIGINS
        sync: false
      - key: CHROME_HEADLESS
        value: "1"
      - key: CHROME_USER_DATA
        value: /var/data/chrome_profile
      - key: CHROME_PROFILE_FOLDER
        value: Default
      - key: MEDIA_DIR
        value: /var/data/uploaded_media
      - key: SECRET_KEY
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PAGE_URL
        sync: false
      - key: MAX_GROUPS_PER_SESSION
        value: "7"
      - key: DELAY_BETWEEN_CYCLES
        value: "3600"
      - key: MIN_DELAY_BETWEEN_GROUPS
        value: "60"
      - key: MAX_DELAY_BETWEEN_GROUPS
        value: "120"
      - key: MAX_AUTO_SHARE_TRIES
        value: "3"
